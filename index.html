<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capacitación SST - Ferrearmijos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --ferre-orange: #ea580c; --ferre-dark: #1f2937; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background-color: #f3f4f6; }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        .slide-up { animation: slideUp 0.4s ease-out forwards; }
        .shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
        .img-escenario { width: 100%; height: 220px; object-fit: cover; border-bottom: 5px solid var(--ferre-orange); background-color: #e5e7eb; }
        .point-pop { position: absolute; font-weight: bold; font-size: 1.5rem; animation: floatUp 1s ease-out forwards; pointer-events: none; z-index: 50; }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.5); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl overflow-hidden relative" id="app-container">
        
        <!-- PANTALLA DE CARGA -->
        <div id="loading-screen" class="p-10 text-center flex flex-col items-center justify-center min-h-[400px]">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-orange-600 mb-4" id="loading-spinner"></div>
            <p class="text-gray-600 font-semibold" id="loading-text">Conectando a la base de datos de Ferrearmijos...</p>
        </div>

        <!-- PANTALLA DE REGISTRO -->
        <div id="login-screen" class="hidden p-8 slide-up">
            <div class="text-center mb-6">
                <div class="w-16 h-16 bg-orange-600 text-white rounded-lg flex items-center justify-center mx-auto mb-4 shadow-md rotate-3">
                    <svg class="w-10 h-10 -rotate-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
                </div>
                <h1 class="text-2xl font-black text-gray-800 uppercase tracking-tight">Ferrearmijos</h1>
                <h2 class="text-md text-orange-600 font-bold mb-2">Desafío de Seguridad SST</h2>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Tu Nombre y Apellido</label>
                    <input type="text" id="player-name" placeholder="Ej. Juan Pérez" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-500 transition outline-none">
                </div>
                <div>
                    <label class="block text-sm font-bold text-gray-700 mb-1">Área de Trabajo</label>
                    <select id="player-area" class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-orange-500 transition outline-none bg-white">
                        <option value="">Selecciona tu área...</option>
                        <option value="Administrativa">Administrativa</option>
                        <option value="Ventas">Ventas</option>
                        <option value="Chofer de Ventas">Chofer de Ventas</option>
                        <option value="Bodega">Bodega</option>
                        <option value="Chofer de Bodega">Chofer de Bodega</option>
                        <option value="Ventas Mayoristas">Ventas Mayoristas</option>
                        <option value="Seguridad">Seguridad</option>
                    </select>
                </div>
                <button onclick="iniciarJuego()" class="w-full mt-4 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg">
                    Comenzar Capacitación
                </button>
                <button onclick="verLeaderboard()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg transition duration-200 shadow-sm mt-2">
                    Ver Tabla de Posiciones
                </button>
            </div>
        </div>

        <!-- PANTALLA DE JUEGO -->
        <div id="quiz-screen" class="hidden relative">
            <div class="absolute top-2 right-2 bg-gray-900 text-white px-3 py-1 rounded-full font-bold text-sm z-10 shadow-md flex items-center gap-2">
                <span>Puntos:</span><span id="score-display" class="text-orange-400 text-lg">0</span>
            </div>
            <div class="bg-gray-200 h-1.5 w-full"><div id="progress-bar" class="bg-orange-500 h-1.5 transition-all duration-500" style="width: 0%"></div></div>
            <img id="scenario-image" src="" alt="Escenario Ferretería" class="img-escenario" onerror="this.onerror=null; this.src='https://images.unsplash.com/photo-1541888086425-d81bb19240f5?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80';">
            
            <div class="p-5">
                <div class="flex justify-between items-center mb-3">
                    <span class="text-xs font-bold text-gray-500 uppercase" id="scenario-counter">Caso 1/7</span>
                    <span class="bg-orange-100 text-orange-800 text-xs font-bold px-2 py-0.5 rounded border border-orange-200" id="area-tag">Bodega</span>
                </div>
                <h3 id="question-text" class="text-lg font-bold text-gray-800 mb-4 leading-tight">¿Pregunta?</h3>
                <div id="options-container" class="space-y-2"></div>
                <div id="feedback-box" class="mt-4 hidden rounded-lg p-3 text-sm font-bold border"></div>
                <button id="next-btn" onclick="siguientePregunta()" class="mt-4 w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-md hidden">Siguiente Escenario ➔</button>
            </div>
        </div>

        <!-- PANTALLA FINAL -->
        <div id="end-screen" class="hidden p-8 text-center slide-up">
            <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <svg class="w-10 h-10 text-green-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <h2 class="text-2xl font-black text-gray-800 mb-2">¡Evaluación Terminada!</h2>
            <p class="text-gray-600 mb-6 font-medium">Resultados guardados.</p>
            <div class="bg-orange-50 rounded-xl p-6 mb-6 border-2 border-orange-100">
                <p class="text-sm font-bold text-orange-600 uppercase mb-1">Puntaje Final</p>
                <p class="text-5xl font-black text-gray-900" id="final-score-display">0</p>
            </div>
            <button onclick="verLeaderboard()" class="w-full bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 px-6 rounded-lg mb-3">Ver Tabla de Posiciones</button>
            <button onclick="reiniciarApp()" class="w-full bg-gray-200 hover:bg-gray-300 text-gray-800 font-bold py-3 px-6 rounded-lg">Salir</button>
        </div>

        <!-- PANTALLA LEADERBOARD -->
        <div id="leaderboard-screen" class="hidden flex-col h-[600px] max-h-screen bg-gray-50">
            <div class="bg-gray-900 p-4 text-white flex justify-between items-center shadow-md">
                <h2 class="text-lg font-bold">🏆 Top Ferrearmijos</h2>
                <button onclick="reiniciarApp()" class="text-sm font-bold bg-gray-700 px-3 py-1 rounded hover:bg-gray-600">Volver</button>
            </div>
            <div class="overflow-y-auto flex-1 p-4">
                <div id="leaderboard-list" class="space-y-2"><div class="text-center py-10 text-gray-500">Cargando...</div></div>
            </div>
        </div>
    </div>

    <!-- FIREBASE SDKS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const escenarios = [
            { area: "Bodega", imagen: "escenario_bodega.jpg", pregunta: "Estás en bodega y observas que se han apilado cajas fuertes pesadas superando el límite de peso visible. ¿Qué identificas aquí?", opciones: ["Un Acto Inseguro", "Una Condición Insegura", "Un Incidente"], correcta: 1, feedbackErroneo: "Es el entorno físico de la percha, por lo tanto es una Condición Insegura.", feedbackAcierto: "¡Excelente! Es una Condición Insegura." },
            { area: "Choferes", imagen: "escenario_chofer.jpg", pregunta: "Un chofer sube al camión pisando la llanta mojada sin usar los tres puntos de apoyo. Esta acción es...", opciones: ["Enfermedad Ocupacional", "Condición Insegura", "Acto Inseguro"], correcta: 2, feedbackErroneo: "La PERSONA omite la norma, es su acción.", feedbackAcierto: "¡Correcto! Es un Acto Inseguro." },
            { area: "Ventas", imagen: "escenario_pasillo.jpg", pregunta: "Un cliente derramó aceite. ¿Qué representa el aceite en el piso?", opciones: ["Riesgo de Caída", "Un Peligro", "Un Accidente"], correcta: 1, feedbackErroneo: "El riesgo es la caída, el aceite es la fuente.", feedbackAcierto: "¡Bien hecho! El aceite es el PELIGRO." },
            { area: "Seguridad", imagen: "escenario_extintor.jpg", pregunta: "Un estante bloquea el acceso al extintor. Esto es:", opciones: ["Acto Inseguro", "Condición Insegura", "No hay problema"], correcta: 1, feedbackErroneo: "Altera el entorno de forma física.", feedbackAcierto: "¡Exacto! Es una Condición Insegura." },
            { area: "General", imagen: "escenario_herramienta.jpg", pregunta: "Te dan un estilete sin seguro y roto. ¿Qué debes hacer?", opciones: ["Usarlo con cuidado", "Ponerle cinta", "Reportarlo y cambiarlo"], correcta: 2, feedbackErroneo: "Usar herramientas defectuosas causa accidentes graves.", feedbackAcierto: "¡Correcto! Repórtalo inmediatamente." },
            { area: "Cargas", imagen: "escenario_cargas.jpg", pregunta: "Al levantar 25kg doblas la espalda sin flexionar rodillas. ¿Qué riesgo enfrentas?", opciones: ["Riesgo Físico", "Riesgo Ergonómico", "Riesgo Mecánico"], correcta: 1, feedbackErroneo: "Es un problema de postura.", feedbackAcierto: "¡Correcto! Es un Riesgo Ergonómico." },
            { area: "Psicosocial", imagen: "escenario_psicosocial.jpg", pregunta: "Hay sobrecarga de tareas y presión generando estrés agudo. ¿Qué riesgo es?", opciones: ["Riesgo Psicosocial", "Riesgo Biológico", "Condición Física"], correcta: 0, feedbackErroneo: "Afecta la salud mental y emocional.", feedbackAcierto: "¡Muy bien! Es un Riesgo Psicosocial." }
        ];

        let db, auth, unsubscribeLeaderboard = null;
        let appId = 'ferrearmijos-sst'; // Carpeta en Firebase
        let jugadorActual = { nombre: '', area: '', puntaje: 0 };
        let indexPregunta = 0;

        const ui = {
            loading: document.getElementById('loading-screen'),
            login: document.getElementById('login-screen'),
            quiz: document.getElementById('quiz-screen'),
            end: document.getElementById('end-screen'),
            leaderboard: document.getElementById('leaderboard-screen')
        };

        // INICIALIZACIÓN DE FIREBASE (AQUÍ ESTÁ EL DETECTOR DE ERRORES)
        async function initApp() {
            try {
                // ==============================================================================
                // REEMPLAZA ESTO CON TUS CLAVES EXACTAS DE FIREBASE
                // ==============================================================================
                const firebaseConfig = {
                     apiKey: "AIzaSyCNdNVspdLw7789X0voGiRgpSI3eTxGaJA",
  authDomain: "juego-sst.firebaseapp.com",
  projectId: "juego-sst",
  storageBucket: "juego-sst.firebasestorage.app",
  messagingSenderId: "393157179406",
  appId: "1:393157179406:web:2833b8a78b7345dc53245f",
  measurementId: "G-3H7E3FXHTY"
                };
                // ==============================================================================

                if (firebaseConfig.apiKey === "TU_API_KEY" || !firebaseConfig.apiKey) {
                    throw new Error("⚠️ OLVIDASTE PONER TUS CLAVES: Reemplaza TU_API_KEY en el código.");
                }

                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);

                await signInAnonymously(auth); // Conexión anónima permitida

                ui.loading.classList.add('hidden');
                ui.login.classList.remove('hidden');

            } catch (error) {
                // SI ALGO FALLA, ESTO TE LO GRITARÁ EN LA PANTALLA
                console.error("ERROR CRÍTICO:", error);
                document.getElementById('loading-spinner').classList.add('hidden');
                document.getElementById('loading-text').innerHTML = `
                    <span class="text-red-600 font-black text-xl">¡ERROR DE CONEXIÓN!</span><br><br>
                    <span class="text-sm text-gray-700">${error.message}</span><br><br>
                    <span class="text-xs text-gray-500">Revisa la consola (F12) o tus claves en el código.</span>
                `;
                alert("Hubo un error conectando a Firebase: " + error.message);
            }
        }

        // LÓGICA DEL JUEGO
        window.iniciarJuego = function() {
            const nombre = document.getElementById('player-name').value.trim();
            const area = document.getElementById('player-area').value;
            if (nombre.length < 3) { alert("Ingresa tu nombre y apellido real."); return; }
            if (!area) { alert("Selecciona tu área."); return; }
            jugadorActual = { nombre, area, puntaje: 0 };
            indexPregunta = 0;
            ui.login.classList.add('hidden');
            ui.quiz.classList.remove('hidden');
            ui.quiz.classList.add('fade-in');
            document.getElementById('score-display').innerText = 0;
            cargarPregunta();
        }

        function mostrarPuntosAnimados(puntos, elementoBoton) {
            const rect = elementoBoton.getBoundingClientRect();
            const quizRect = ui.quiz.getBoundingClientRect();
            const pop = document.createElement('div');
            pop.className = 'point-pop ' + (puntos > 0 ? 'text-green-500' : 'text-red-500');
            pop.innerText = puntos > 0 ? `+${puntos}` : `${puntos}`;
            pop.style.left = (rect.left - quizRect.left + rect.width/2) + 'px';
            pop.style.top = (rect.top - quizRect.top) + 'px';
            ui.quiz.appendChild(pop);
            setTimeout(() => pop.remove(), 1000);
        }

        function cargarPregunta() {
            const esc = escenarios[indexPregunta];
            document.getElementById('scenario-image').src = esc.imagen;
            document.getElementById('scenario-counter').innerText = `Caso ${indexPregunta + 1}/${escenarios.length}`;
            document.getElementById('area-tag').innerText = esc.area;
            document.getElementById('question-text').innerText = esc.pregunta;
            document.getElementById('progress-bar').style.width = `${(indexPregunta / escenarios.length) * 100}%`;
            document.getElementById('feedback-box').classList.add('hidden');
            document.getElementById('next-btn').classList.add('hidden');
            const cont = document.getElementById('options-container');
            cont.innerHTML = '';
            esc.opciones.forEach((opc, i) => {
                const btn = document.createElement('button');
                btn.className = 'opcion-btn w-full text-left p-4 rounded-xl border-2 border-gray-200 bg-white hover:border-orange-400 hover:bg-orange-50 font-semibold text-gray-700 outline-none';
                btn.innerText = opc;
                btn.onclick = () => evaluarRespuesta(i, btn);
                cont.appendChild(btn);
            });
        }

        function evaluarRespuesta(indice, boton) {
            const esc = escenarios[indexPregunta];
            const feedbackBox = document.getElementById('feedback-box');
            const botones = document.querySelectorAll('.opcion-btn');
            botones.forEach(b => b.classList.remove('shake', 'border-red-500', 'bg-red-50', 'text-red-700'));

            if (indice === esc.correcta) {
                jugadorActual.puntaje += 2;
                mostrarPuntosAnimados(2, boton);
                document.getElementById('score-display').innerText = jugadorActual.puntaje;
                boton.classList.add('border-green-500', 'bg-green-50', 'text-green-800');
                botones.forEach(b => { b.disabled = true; b.classList.add('opacity-50'); });
                boton.classList.remove('opacity-50');
                feedbackBox.classList.remove('hidden', 'bg-red-50', 'text-red-700', 'border-red-200');
                feedbackBox.classList.add('bg-green-50', 'text-green-800', 'border-green-200', 'fade-in');
                feedbackBox.innerHTML = `✓ ${esc.feedbackAcierto}`;
                document.getElementById('next-btn').classList.remove('hidden', 'fade-in');
            } else {
                jugadorActual.puntaje -= 1;
                mostrarPuntosAnimados(-1, boton);
                document.getElementById('score-display').innerText = jugadorActual.puntaje;
                boton.classList.add('border-red-500', 'bg-red-50', 'text-red-700', 'shake');
                feedbackBox.classList.remove('hidden', 'bg-green-50', 'text-green-800', 'border-green-200');
                feedbackBox.classList.add('bg-red-50', 'text-red-700', 'border-red-200', 'fade-in');
                feedbackBox.innerHTML = `✗ ${esc.feedbackErroneo}`;
            }
        }

        window.siguientePregunta = function() {
            indexPregunta++;
            if (indexPregunta < escenarios.length) cargarPregunta();
            else finalizarJuego();
        }

        async function finalizarJuego() {
            ui.quiz.classList.add('hidden');
            ui.end.classList.remove('hidden');
            document.getElementById('final-score-display').innerText = jugadorActual.puntaje;

            if (auth && auth.currentUser) {
                try {
                    const coleccionRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
                    await addDoc(coleccionRef, {
                        nombre: jugadorActual.nombre,
                        area: jugadorActual.area,
                        puntaje: jugadorActual.puntaje,
                        fecha: serverTimestamp(),
                        userId: auth.currentUser.uid
                    });
                    console.log("¡Guardado exitoso en Firebase!");
                } catch (error) {
                    alert("No se pudo guardar en la base de datos. Motivo: " + error.message);
                }
            }
        }

        // LEADERBOARD
        window.verLeaderboard = function() {
            ui.login.classList.add('hidden'); ui.quiz.classList.add('hidden'); ui.end.classList.add('hidden');
            ui.leaderboard.classList.remove('hidden'); ui.leaderboard.classList.add('flex');
            const lista = document.getElementById('leaderboard-list');
            lista.innerHTML = '<div class="text-center py-10">Cargando...</div>';

            if (!auth || !auth.currentUser) return;
            const coleccionRef = collection(db, 'artifacts', appId, 'public', 'data', 'leaderboard');
            
            if (unsubscribeLeaderboard) unsubscribeLeaderboard(); 

            unsubscribeLeaderboard = onSnapshot(coleccionRef, (snapshot) => {
                let puntuaciones = [];
                snapshot.forEach(doc => puntuaciones.push({ id: doc.id, ...doc.data() }));
                puntuaciones.sort((a, b) => b.puntaje - a.puntaje);
                
                lista.innerHTML = ''; 
                if(puntuaciones.length === 0) { lista.innerHTML = '<div class="text-center py-10">Sin registros.</div>'; return; }

                puntuaciones.forEach((jugador, index) => {
                    let cMed = 'bg-gray-100 text-gray-600', trf = '';
                    if (index === 0) { cMed = 'bg-yellow-100 text-yellow-700'; trf = '🏆'; }
                    else if (index === 1) { cMed = 'bg-gray-200 text-gray-700'; trf = '🥈'; }
                    else if (index === 2) { cMed = 'bg-orange-100 text-orange-800'; trf = '🥉'; }
                    const item = document.createElement('div');
                    item.className = `flex items-center justify-between p-3 rounded-lg border ${cMed}`;
                    item.innerHTML = `<div class="flex items-center gap-3"><div class="font-bold w-6 text-center">${index + 1}</div><div><div class="font-bold">${jugador.nombre} ${trf}</div><div class="text-xs">${jugador.area}</div></div></div><div class="text-lg font-black">${jugador.puntaje} pts</div>`;
                    lista.appendChild(item);
                });
            }, (error) => {
                alert("Error cargando tabla: " + error.message);
            });
        }

        window.reiniciarApp = function() {
            if (unsubscribeLeaderboard) unsubscribeLeaderboard(); 
            ui.leaderboard.classList.add('hidden'); ui.end.classList.add('hidden'); ui.login.classList.remove('hidden');
            document.getElementById('player-name').value = ''; document.getElementById('player-area').value = '';
        }

        window.addEventListener('load', initApp);
    </script>
</body>
</html>
